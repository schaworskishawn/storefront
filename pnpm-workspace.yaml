packages:
  - .

blockExoticSubdeps: true

ignoredBuiltDependencies:
  - "@parcel/watcher"
  - "@swc/core"
  - esbuild
  - isolated-vm
  - sharp
  - unrs-resolver

minimumReleaseAge: 1440

overrides:
  "@babel/helpers": ">=7.26.10"
  "@babel/runtime": ">=7.26.10"
  brace-expansion@>=2: ">=2.0.2"
  dset: ">=3.1.4"
  graphql: 16.8.1
  micromatch: ">=4.0.8"

trustPolicy: no-downgrade

trustPolicyExclude:
  - semver@6.3.1
